# Tell DJL Serving to use the Python engine and our custom handler. Without an
# explicit engine, DJL tries to auto-detect a model in /opt/ml/model, finds only
# LoRA weights (no config.json), and fails with "Failed to detect engine of the
# model". engine=Python + option.entryPoint routes startup to inference.py's
# handle() function instead.
engine=Python
option.entryPoint=inference.py
option.handler=handle
minWorkers=1
maxWorkers=1
