# Experiment tracking
MLFLOW_ARN: "arn:aws:sagemaker:us-west-2:781297242028:mlflow-app/app-PWDIRFTCJKN5"
MLFLOW_EXPERIMENT_NAME: random-forest-experiment

# Permissions
SAGEMAKER_EXECUTION_ROLE: "arn:aws:iam::781297242028:role/service-role/AmazonSageMaker-ExecutionRole-20200630T141851"