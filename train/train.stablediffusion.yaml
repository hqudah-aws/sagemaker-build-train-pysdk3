# Metadata
job_name: stable-diffusion-training

# Data
training_data_s3_path: "s3://bobby-demo/stable-diffusion/data"
model_output_s3_path: "s3://bobby-demo/stable-diffusion/model-output"

# Code
SOURCE_CODE_DIR: ./train/stable_diffusion
SOURCE_CODE_ENTRY_POINT_COMMAND: /bin/bash base.sh --config recipes/default-medium-g5_12x.yaml --training-script train_text_to_image_lora.py --accelerate-config accelerate_configs/ddp.yaml

# Compute
IMAGE_URI: "781297242028.dkr.ecr.us-west-2.amazonaws.com/stablediffusion:latest"
