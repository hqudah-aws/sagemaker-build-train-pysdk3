AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Creates an AWS Secrets Manager secret holding the secrets a SageMaker training
  job needs (HF_TOKEN and WANDB_API_KEY), plus an IAM managed policy that grants
  read access to that secret. Attach the managed policy to your SageMaker
  execution role, then pass the secret ARN to the training job via the
  ModelTrainer `environment` parameter. The training script fetches the secret
  at runtime and exports each key as an environment variable.

Parameters:
  SecretName:
    Type: String
    # The "AmazonSageMaker-" prefix means execution roles using the AWS-managed
    # AmazonSageMakerFullAccess policy can already read this secret. The managed
    # policy below is the explicit, least-privilege alternative for custom roles.
    Default: AmazonSageMaker-script-mode-blog-secrets
    Description: Name for the Secrets Manager secret.

  HuggingFaceToken:
    Type: String
    NoEcho: true
    Description: >-
      Hugging Face access token, stored under the key HF_TOKEN. Use a dummy
      value while validating; replace with a real token before running the
      Stable Diffusion example (which pulls a gated model).

  WandbApiKey:
    Type: String
    NoEcho: true
    Description: >-
      Weights & Biases API key, stored under the key WANDB_API_KEY. Optional for
      training; a dummy value is fine for validation.

Resources:
  TrainingSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Secrets injected into SageMaker training jobs (script-mode SDK v3 blog).
      SecretString: !Sub '{"HF_TOKEN":"${HuggingFaceToken}","WANDB_API_KEY":"${WandbApiKey}"}'

  TrainingSecretReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Grants read access to the training secret. Attach to your SageMaker execution role.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: !Ref TrainingSecret

Outputs:
  SecretArn:
    Description: ARN of the secret. Pass this to the training job (environment SECRETS_ARN).
    Value: !Ref TrainingSecret

  SecretReadPolicyArn:
    Description: ARN of the managed policy. Attach this to your SageMaker execution role.
    Value: !Ref TrainingSecretReadPolicy
